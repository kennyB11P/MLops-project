services:
  api:
    build:
      context: ./backend
    container_name: reviews_service_api
    env_file:
      - ./backend/.env
    environment:
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-wb_reviews_bge_m3}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-large}
      OPENAI_TIMEOUT_SECONDS: ${OPENAI_TIMEOUT_SECONDS:-30}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-bge_m3}
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-BAAI/bge-m3}
      RUNPOD_API_KEY: ${RUNPOD_API_KEY:-}
      RUNPOD_ENDPOINT_ID: ${RUNPOD_ENDPOINT_ID:-}
      RUNPOD_BASE_URL: ${RUNPOD_BASE_URL:-https://api.runpod.ai/v2}
      RUNPOD_WAIT_MS: ${RUNPOD_WAIT_MS:-120000}
      RUNPOD_EMBEDDING_INPUT_KEY: ${RUNPOD_EMBEDDING_INPUT_KEY:-text}
      HF_HOME: /app/data/hf_cache
      TRANSFORMERS_CACHE: /app/data/hf_cache
      CHAT_PARSER_MODE: ${CHAT_PARSER_MODE:-auto}
      CHAT_PARSER_TIMEOUT_SECONDS: ${CHAT_PARSER_TIMEOUT_SECONDS:-8}
      RAG_VALIDATE_CANDIDATES: ${RAG_VALIDATE_CANDIDATES:-true}
      RAG_VALIDATION_LIMIT: ${RAG_VALIDATION_LIMIT:-30}
      RAG_EMBEDDING_TIMEOUT_SECONDS: ${RAG_EMBEDDING_TIMEOUT_SECONDS:-30}
      RAG_QDRANT_TIMEOUT_SECONDS: ${RAG_QDRANT_TIMEOUT_SECONDS:-15}
      RAG_VALIDATION_TIMEOUT_SECONDS: ${RAG_VALIDATION_TIMEOUT_SECONDS:-20}
      RAG_KEYWORD_RESCUE_LIMIT: ${RAG_KEYWORD_RESCUE_LIMIT:-10}
      RAG_KEYWORD_RESCUE_MAX_SCAN: ${RAG_KEYWORD_RESCUE_MAX_SCAN:-1500}
      RAG_WARMUP_ON_STARTUP: ${RAG_WARMUP_ON_STARTUP:-false}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-900}
      DB_EXPORTS_DIR: /app/data/db_exports
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
      - ../data/db_exports:/app/data/db_exports:ro
    depends_on:
      - postgres
      - qdrant

  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: reviews_service_frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - api

  frontend-build:
    build:
      context: ./frontend
      target: build
    container_name: reviews_service_frontend_build
    profiles:
      - build

  db-loader:
    build:
      context: ./backend
    container_name: reviews_service_db_loader
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_DSN: postgresql://reviews_user:reviews_password@postgres:5432/reviews_db
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-wb_reviews_bge_m3}
      DB_EXPORTS_DIR: /app/data/db_exports
      POSTGRES_EXPORT_DIR: /app/data/db_exports/postgres_reviews_bge_m3_linearsvc_saved_model
      QDRANT_EXPORT_DIR: /app/data/db_exports/qdrant_vectors_baai_bge_m3
    command: ["python", "-m", "app.offline.load_db_exports", "--target", "all"]
    volumes:
      - ../data/db_exports:/app/data/db_exports:ro
    depends_on:
      - postgres
      - qdrant
    profiles:
      - tools

  postgres:
    image: postgres:16
    container_name: reviews_service_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: reviews_db
      POSTGRES_USER: reviews_user
      POSTGRES_PASSWORD: reviews_password
    ports:
      # 5432 на Mac часто уже занят старым PostgreSQL, поэтому наружу отдаем 5433.
      # Внутри Docker-сети backend все равно ходит на postgres:5432.
      - "5433:5432"
    volumes:
      - reviews_postgres_data:/var/lib/postgresql/data
      - ./backend/sql/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro

  qdrant:
    image: qdrant/qdrant:latest
    container_name: reviews_service_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - reviews_qdrant_data:/qdrant/storage

volumes:
  reviews_postgres_data:
  reviews_qdrant_data:
  frontend_node_modules:
